<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--
    Single root element.
    Structure: floating card with glass morphism effect.
    No framework — pure DOM manipulation in app.js.
  -->
    <div id="app" class="app hidden">
      <!-- ── Header ────────────────────────────────────────────────────────── -->
      <header class="header">
        <div class="brand">
          <span class="brand-mark">✦</span>
          <span class="brand-name">Pencraft</span>
        </div>
        <div
          class="mode-tabs"
          id="modeTabs"
          role="tablist"
          aria-label="Writing modes"
        >
          <!-- Populated dynamically from config modes -->
        </div>
        <button
          class="close-btn"
          id="closeBtn"
          aria-label="Close (Escape)"
          title="Escape"
        >
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M1 1L11 11M11 1L1 11"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </header>

      <!-- ── Input area ─────────────────────────────────────────────────────── -->
      <div class="input-section">
        <textarea
          id="inputText"
          class="text-area input-text"
          placeholder="Paste or type text to improve… (auto-filled from selection)"
          spellcheck="false"
          aria-label="Input text"
          rows="4"
        ></textarea>
      </div>

      <!-- ── Divider with action bar ────────────────────────────────────────── -->
      <div class="action-bar">
        <div class="hint-pills">
          <span class="hint">↵ Generate</span>
          <span class="hint">⎋ Close</span>
        </div>
        <button
          class="generate-btn"
          id="generateBtn"
          aria-label="Generate (Enter)"
        >
          <span class="generate-icon">
            <!-- Idle icon -->
            <svg
              class="icon-spark"
              width="14"
              height="14"
              viewBox="0 0 14 14"
              fill="none"
            >
              <path
                d="M7 1L8.5 5.5L13 7L8.5 8.5L7 13L5.5 8.5L1 7L5.5 5.5L7 1Z"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linejoin="round"
              />
            </svg>
            <!-- Spinner (hidden by default) -->
            <svg
              class="icon-spinner"
              width="14"
              height="14"
              viewBox="0 0 14 14"
              fill="none"
              style="display: none"
            >
              <circle
                cx="7"
                cy="7"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-dasharray="20"
                stroke-dashoffset="10"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="generate-label">Improve</span>
        </button>
      </div>

      <!-- ── Output area ────────────────────────────────────────────────────── -->
      <div class="output-section" id="outputSection" style="display: none">
        <div class="output-header">
          <span class="output-label">Result</span>
          <div class="output-actions">
            <button
              class="action-btn"
              id="copyBtn"
              aria-label="Copy to clipboard"
            >
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect
                  x="4"
                  y="4"
                  width="8"
                  height="8"
                  rx="1.5"
                  stroke="currentColor"
                  stroke-width="1.2"
                />
                <path
                  d="M1 9V2C1 1.44772 1.44772 1 2 1H9"
                  stroke="currentColor"
                  stroke-width="1.2"
                  stroke-linecap="round"
                />
              </svg>
              Copy
            </button>
            <button
              class="action-btn"
              id="replaceBtn"
              aria-label="Replace & close"
            >
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path
                  d="M2 7L5 10L11 3"
                  stroke="currentColor"
                  stroke-width="1.4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              Replace & Close
            </button>
          </div>
        </div>
        <div
          class="text-area output-text"
          id="outputText"
          aria-live="polite"
          aria-label="Generated result"
        ></div>
      </div>

      <!-- ── Error toast ────────────────────────────────────────────────────── -->
      <div
        class="error-toast"
        id="errorToast"
        role="alert"
        style="display: none"
      >
        <span class="error-icon">⚠</span>
        <span class="error-msg" id="errorMsg"></span>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
